---
site_name: "LTROPS-2323: Master IOS XE Automation in Just 4 Hours"
#site_description: {site_name} # This parameter will be auto-set to site_name, unless explicitly defined. Used for HTML meta tags
site_author: "Asier Arlegui Lacunza, Balu Novak-Bohak"
copyright: Copyright &copy; {year} Cisco # This parameter will auto-update the year in HTML pages based on the build date
theme:
  name: material
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.indexes
    - navigation.instant
    - navigation.top
    - navigation.footer
    - search.suggest
    - content.code.copy
    - toc.integrate
  custom_dir: docs/overrides
  palette:
    # Palette toggle for light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  logo: template_assets/cisco_logo.png
  favicon: template_assets/cisco_logo.png
extra:
  generator: false
  footer_revision_datetime: true # Change to true to add to the footer the datetime for last update.
extra_css:
  - stylesheets/extra.css
plugins:
  - search
  - awesome-nav
  - to-pdf:
      cover_subtitle: "Instructor-Led Labs"
      cover_logo: template_assets/PDF_Event_General_Logo.png
      ordered_chapter_level: 1
      copyright: Copyright &copy; Cisco 
      enabled: !ENV [ENABLE_PDF_EXPORT, false]  # Set to true or comment this line with # to enable lab guide export to PDF file
  - glightbox:
      touchNavigation: true
      loop: false
      effect: fade
      slide_effect: slide
      width: 100%
      height: auto
      zoomable: true
      draggable: false
      skip_classes:
      - custom-skip-class-name
      auto_caption: true
      caption_position: top
  - macros:
      include_yaml: 
        - data/vars_global.yaml
        - data/vars_pods.yaml
      on_error_fail: !ENV [MACRO_ERROR_FAIL, true]  # Set to false or comment this line with # to ignore macro errors and continue the build
      on_undefined: strict
      verbose: false

markdown_extensions:
  - md_in_html
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - meta
  - tables
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
hooks:
  - hooks/config.py
dev_addr: "0.0.0.0:8000"
