name: Build & publish to GitHub Pages

on:
  # Rebuild whenever main changes
  push:
    branches:
      - main
  # Allow a manual run from the Actions tab
  workflow_dispatch:

# Required for the pages-deploy action
permissions:
  contents: read
  pages: write
  id-token: write

# Only one concurrent deployment at a time; newer pushes cancel queued ones.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history so the git-info macros / revision dates work.
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install system dependencies for WeasyPrint (PDF export)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libpango-1.0-0 libpangoft2-1.0-0 libharfbuzz0b \
            libcairo2 libffi-dev shared-mime-info fonts-dejavu

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build MkDocs site
        env:
          # Fail the build on macro errors — matches local dev defaults.
          MACRO_ERROR_FAIL: "true"
        run: mkdocs build --clean

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
