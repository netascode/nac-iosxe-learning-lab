---
name: Lint docs

on:
  push:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  no-special-dashes:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for em-dashes and en-dashes
        run: |
          if grep -rn $'\xe2\x80\x94\|\xe2\x80\x93' docs/ --include='*.md' --include='*.yml' --include='*.yaml' --include='*.html' --include='*.css'; then
            echo ""
            echo "::error::Found em-dashes (U+2014) or en-dashes (U+2013) in docs/. Use plain dashes (-) instead."
            exit 1
          fi
          echo "No special dashes found."
